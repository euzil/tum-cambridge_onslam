inherit_from: ./configs/droid_w.yaml

dataset: 'droidw'

stride: 1

data:
  root_folder: ./datasets/DROID-W
  output: ./Outputs/DROID-W

cam:
  ### target/output camera settings, camera_size -> resize -> crop -> target_size
  H: 1200
  W: 1600
  fx: 893.342715
  fy: 894.663808
  cx: 778.820175
  cy: 588.956733
  distortion: [-0.152652, 0.105404, -0.000751, 0.000176, -0.020031]
  H_edge: 8
  W_edge: 8
  H_out: 360
  W_out: 480

tracking:
  buffer: 560
  force_keyframe_every_n_frames: -1
  uncertainty_params:
    gamma_depth: 0.01

